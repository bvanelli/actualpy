name: Mypy

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  mypy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          uv sync --all-extras
      - name: Type check with mypy
        run: |
          uv run mypy actual
